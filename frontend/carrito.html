<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NextPlay - Carrito</title>
    <link rel="icon" type="image/x-icon" href="public/assets/favicon.ico">
    <link rel="stylesheet" href="css/style.css">
    <style>

        .carrito-layout {
            display: grid;
            grid-template-columns: 1fr 340px;
            gap: 1.5rem;
            align-items: start;
        }


        .carrito-lista {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }
        .carrito-item {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            padding: 1rem 1.25rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            transition: border-color 0.2s ease, box-shadow 0.2 ease;
            animation: fadeInCard 0.3s ease both;
        }

        @keyframes fadeInCard {
            from { opacity: 0;  transform: translateY(8px); }
            to { opacity: 1;transform: translateY(0);  }
        }

        .carrito-item:hover {
            border-color: var(--border-hover);
            box-shadow: var(--shadow-sm);
        }
        
        .carrito-item__img {
            width: 64px;
            height: 64px;
            border-radius: var(--radius-md);
            background: var(--bg-secondary);
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;

        }

        .carrito-item__img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .carrito-item__img svg {
            width: 28px;
            height: 28px;
            opacity: 0.3;
            color: var(--text-muted);
        }

        .carrito-item_info {
            flex: 1;
            min-width: 0;
        }

        .carrito-item__nombre {
            font-family: 'Exo 2', sans-serif;
            font-weight: 700;
            font-size: 0.95rem;
            color: var(--text-primary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 0.2rem;
        }

        .carrito-item__tipo {
            font-size: 0.78rem;
            color: var(--text-muted);
            text-transform: capitalize;
        }

        .carrito-item__precio-unit {
            font-size: 0.82rem;
            color: var(--text-muted);
            margin-top: 0.1rem;
        }

        .carrito-item__cantidad {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            flex-shrink: 0;
        }

        .cantida-btn {
            width: 32px;
            height: 32px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border-color);
            background: var(--bg-secondary);
            color: var(--text-primary);
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            transition: all 0.15s ease;
            line-height: 1;
        }

        .cantida-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
            background: var(--accent-light);
        }

        .cantida-btn.btn-restar:hover {
            border-color: #EF4444;
            color: #EF4444;
            background: #FEF2F2;
        }

        .cantidad-num {
            font-weight: 700;
            font-size: 1rem;
            min-width: 24px;
            text-align: center;
            color: var(--text-primary);
        }


        .carrito-item__subtotal {
            font-family: 'Exo 2', sans-serif;
            font-weight: 900;
            font-size: 1rem;
            color: var(--violeta);
            min-width: 90px;
            text-align: right;
            flex-shrink: 0;
        }

        [data-theme="dark"] .carrito-item__subtotal {
            color: var(--violeta-claro);
        }
        
        .btn-eliminar {
            width: 32px;
            height: 32px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border-color);
            background: transparent;
            color: var(--text-muted);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s ease;
            flex-shrink: 0;
        }

        .btn-eliminar svg {
            width: 16px;
            height: 16px;
        }

        .btn-eliminar:hover {
            border-color: #EF4444;
            color: #EF4444;
            background: #FEF2F2;
        }
        .carrito-resumen {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            padding: 1.5rem;
            position: sticky;
            top: calc(var(--nav-height) + 1rem);
        }

        .carrito-resumen h3 {
            font-size: 1.1rem;
            margin-bottom: 1.25rem;
            color: var(--text-primary);
        }

        .resumen-linea {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.9rem;
            color: var(--text-secondary);
            padding: 0.4rem 0;
        }

        .resumen-linea.total {
            font-family: 'Exo 2', sans-serif;
            font-weight: 900;
            font-size: 1.2rem;
            color: var(--text-primary);
            padding-top: 0.75rem;
            margin-top: 0.25rem;
            border-top: 1px solid var(--border-color);
        }

        .resumen-linea.total span:last-child {
            color: var(--violeta);
        }

        [data-theme="dark"] .resumen-linea.total span:last-child {
            color: var(--violeta-claro);
        }

        .btn-confirmar {
            width: 100%;
            margin-top: 1.25rem;
            padding: 0.85rem;
            font-size: 1rem;
            font-weight: 600;
            border-radius: var(--radius-md);
            background: linear-gradient(135deg, var(--violeta), #6D28D9);
            color: #fff;
            border: none;
            cursor: pointer;
            transition: all 0.25s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            box-shadow: 0 4px 16px rgba(124, 58, 237, 0.35);
        }

        .btn-confirmar:hover:not(:disabled) {
            background: linear-gradient(135deg, var(--violeta-oscuro), var(--violeta));
            box-shadow: 0 6px 24px rgba(124, 58, 237, 0.45);
            transform: translateY(-1px);
        }

        .btn-confirmar:disabled {
            opacity: 0.45;
            cursor: not-allowed;
            transform: none;
        }

        .btn-confirmar svg {
            width: 18px;
            height: 18px;
        }

        .btn-seguir {
            width: 100%;
            margin-top: 0.75rem;
            padding: 0.7rem;
            font-size: 0.9rem;
            font-weight: 500;
            border-radius: var(--radius-md);
            background: transparent;
            color: var(--text-secondary);
            border: 1px solid var(--border-color);
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            text-decoration: none;
        }

        .btn-seguir:hover {
            border-color: var(--accent);
            color: var(--accent);
            background: var(--accent-light);
        }

        .btn-seguir svg {
            width: 16px;
            height: 16px;
        }
        .carrito-vacio {
            grid-column: 1 / -1;
            text-align: center;
            padding: 5rem 1rem;
        }

        .carrito-vacio svg {
            width: 64px;
            height: 64px;
            opacity: 0.2;
            margin-bottom: 1rem;
            color: var(--text-muted);
        }

        .carrito-vacio h3 {
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
        }

        .carrito-vacio p {
            color: var(--text-muted);
            margin-bottom: 1.5rem;
        }
        .modal-icon {
            width: 56px;
            height: 56px;
            border-radius: var(--radius-lg);
            background: linear-gradient(135deg, var(--violeta), var(--celeste));
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 1rem;
        }

        .modal-icon svg {
            width: 28px;
            height: 28px;
            color: #fff;
        }
        @media (max-width: 768px) {
            .carrito-layout {
                grid-template-columns: 1fr;
            }

            .carrito-resumen {
                position: static;
                order: -1;
            }

            .carrito-item__subtotal {
                display: none;
            }
        }

        @media (max-width: 480px) {
            .carrito-item {
                flex-wrap: wrap;
                gap: 0.75rem;
            }

            .carrito-item__img {
                width: 48px;
                height: 48px;
            }
        }

    </style>
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="navbar__brand">
            <div class="navbar__logo-placeholder">NP</div>
            <span class="navbar__appname">NextPlay</span>
        </a>

        <div class="navbar__nav">
            <a href="productos.html" class="navbar__link">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="2" y="3" width="20" height="14" rx="2"/>
                    <line x1="8" y1="21" x2="16" y2="21"/>
                    <line x1="12" y1="17" x2="12" y2="21"/>
                </svg>
                Productos
            </a>
            <a href="carrito.html" class="navbar__link active">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
                    <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
                </svg>
                Carrito
            </a>

        </div>
        <div class="navbar__right">
            <span class="navbar__alumnos">Alumnos: Llop Tomas & Lopez Juan</span>
            <a href="carrito.html" class="navbar__carrito" title="Ver Carrito">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
                    <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
                </svg>
                <span class="carrito-badge" id="carritoBadge" style="display: none;">0</span>
            </a>
            <button class="btn-theme" id="btnTema" title="Cambiar tema" aria-label="Cambiar tema">
                <svg id="iconoSol" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
                    <circle cx="12" cy="12" r="5"/>
                    <line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
                    <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
                    <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
                    <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
                </svg>
                <svg id="iconoLuna" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
                </svg>

            </button>
        </div>
    </nav>
    <main class="main-content">
        <div class="container">
            <div class="mb-3">
                <h2>Tu carrito</h2>
                <p id="subtituloCarrito" class="text-muted">
                    Aqui estan tus productos cargados
                </p>
            </div>
                <div class="carrito-layout" id="carritoLayout">
            </div>
        </div>
    </main>
    <div class="modal-overlay" id="modalConfirmar">
        <div class="modal">
            <div class="modal-icon">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="20 6 9 17 4 12"/>
                </svg>
            </div>
            <h3 class="modal__title">Confirmar compra</h3>  
            <p class="modal__body" id="modalTexto">¿Quieres confirmar tu compra?</p>
            <div class="modal__actions">
                <button class="btn btn-outline" id="btnCancelarModal">Cancelar</button>
                <button class="btn btn-primary" id="btnConfirmarModal">Confirmar</button>
            </div>
        </div>
    </div>
    <script type="module" src="js/carrito.js"></script>
</body>
</html>
