<!DOCTYPE html>
<html lang="en" data-theme="ligth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NextPlay - Productos</title>
    <link rel="icon" type="image/x-icon" href="public/assets/favicon_nextplay.webp">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .categorias {
            display: flex;
            gap: 0.6rem;
            margin-bottom: 2rem;
        }
        .btn-categoria{
            
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.6rem 1.4rem;
            border-radius: var(--radius-xl);
            border: 1.5px solid var(--border-color);
            background: var(--bg-card);
            color: var(--text-secondary);
            font-family: 'DM Sans', sans-serif;
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2 ease;
        }
        .btn-categoria svg {
            width: 18px;
            height: 18px;
            flex-shrink: 0;
        }
        .btn-categoria:hover {
            border-color: var(--accent);
            color: var(--accent);
            background: var(--accent-light);
        }

        .btn-categoria.active {
            background: var(--violeta);
            border-color: var(--violeta);
            color: #fff;
            box-shadow: var(--shadow-sm);
        }
        .productos-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }

        .productos-header h2 {
            font-size: 1.3rem;
            color: var(--text-primary);
        }

        .productos-count {
            font-size: 0.85rem;
            color: var(--text-muted);
        }


        .productos-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1.25rem;
        }

    
        .producto-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: box-shadow 0.2s ease, border-color 0.2s ease, transform 0.2s ease;
            animation: fadeInCard 0.35s ease both;
        }

        @keyframes fadeInCard {
            from { opacity: 0; transform: translateY(12px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .producto-card:hover {
            box-shadow: var(--shadow-md);
            border-color: var(--border-hover);
            transform: translateY(-2px);
        }

        .producto-card__img-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 16 / 10;
            background: var(--bg-secondary);
            overflow: hidden;
        }

        .producto-card__img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s ease;
        }

        .producto-card:hover .producto-card__img {
            transform: scale(1.04);
        }

        .producto-card__img-placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
        }

        .producto-card__img-placeholder svg {
            width: 40px;
            height: 40px;
        opacity: 0.4;
        }

        .producto-card__badge {
            position: absolute;
            top: 0.6rem;
            left: 0.6rem;
            background: var(--violeta);
            color: #fff;
            font-size: 0.7rem;
            font-weight: 700;
            padding: 0.2rem 0.6rem;
            border-radius: 99px;
            letter-spacing: 0.4px;
            text-transform: uppercase;
        }

        .producto-card__body {
            padding: 1rem;
            display: flex;
            flex-direction: column;
            flex: 1;
            gap: 0.4rem;
        }
        .producto-card__nombre {
            font-family: 'Exo 2', sans-serif;
            font-weight: 700;
            font-size: 0.95rem;
            color: var(--text-primary);
            line-height: 1.3;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .producto-card__precio {
            font-family: 'Exo 2', sans-serif;
            font-weight: 900;
            font-size: 1.15rem;
            color: var(--violeta);
            margin-top: auto;
            padding-top: 0.4rem;
        }

        [data-theme="dark"] .producto-card__precio {
            color: var(--violeta-claro);
        }

        .producto-card__footer {
            padding: 0 1rem 1rem;
            display: flex;
            gap: 0.5rem;
        }

    
        .btn-agregar {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.4rem;
            padding: 0.55rem 0.8rem;
            border-radius: var(--radius-md);
            background: var(--violeta);
            color: #fff;
            border: none;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.88rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-agregar svg {
            width: 16px;
            height: 16px;
            flex-shrink: 0;
        }

        .btn-agregar:hover {
            background: var(--violeta-oscuro);
            transform: translateY(-1px);
        }

        .btn-agregar:active {
            transform: translateY(0);
        }

    
        .btn-agregar.en-carrito {
            background: var(--accent-light);
            color: var(--violeta);
            border: 1px solid var(--border-hover);
        }

        [data-theme="dark"] .btn-agregar.en-carrito {
            color: var(--violeta-claro);
        }

        .btn-agregar.en-carrito:hover {
            background: var(--border-hover);
        }

    
        .cantidad-control {
            display: none;
            align-items: center;
            gap: 0.3rem;
        }

        .cantidad-control.visible {
            display: flex;
        }

        .cantidad-btn {
            width: 28px;
            height: 28px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border-color);
            background: var(--bg-secondary);
            color: var(--text-primary);
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s ease;
            line-height: 1;
        }

        .cantidad-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
            background: var(--accent-light);
        }

        .cantidad-num {
            font-weight: 700;
            font-size: 0.95rem;
            min-width: 22px;
            text-align: center;
            color: var(--text-primary);
        }


        .productos-loading {
            grid-column: 1 / -1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            padding: 4rem 0;
            color: var(--text-muted);
        }
        .productos-vacio {
            grid-column: 1 / -1;
            text-align: center;
            padding: 4rem 0;
            color: var(--text-muted);

        }

        .productos-vacio svg {
            width: 48px;
            height: 48px;
            opacity: 0.3;
            margin-bottom: 1rem;
        }

    
        @media (max-width: 900px) {
            .productos-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 560px) {
            .productos-grid {
                grid-template-columns: 1fr;
            }
            .categorias {
                width: 100%;
            }

            .btn-categoria {
                flex: 1;
                justify-content: center;
            }
        }


    </style>
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="navbar__brand">
            <div class="navbar__logo-placeholder">NP</div>
            <span class="navbar__appname">NextPlay</span>
        </a>
        <div class="navbar__nav">
            <a href="productos.html" class="navbar__link active">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="2" y="3" width="20" height="14" rx="2"/>
                    <line x1="8" y1="21" x2="16" y2="21"/>
                    <line x1="12" y1="17" x2="12" y2="21"/>
                </svg>
                Productos
            </a>
            <a href="carrito.html" class="navbar__link">
                <svg vg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
                    <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
                </svg>
                Carrito
            </a>
        </div>
        <div class="navbar__right">
            <span class="navbar__alumnos">Alumnos: Llop Tomas & Lopez Juan</span>
            <a href="carrito.html" class="navbar__carrito" title="Ver Carrito">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
                    <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
                </svg>
                <span class="carrito-badge" id="carritoBadge" style="display: none;">0</span>
            </a>
            <button class="btn-theme" id="btnTema" title="Cambiar tema" aria-label="Cambiar tema">
                <svg id="iconoSol" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
                    <circle cx="12" cy="12" r="5"/>
                    <line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
                    <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
                    <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
                    <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
                </svg>
                <svg id="iconoLuna" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
                </svg>

            </button>
        </div>
    </nav>

    <main class="main-content">
        <div class="container">
            <div class="mb-3">
                <h2 id="saludo">Explora los mejores juegos y consolas</h2>
                <p id="subtitulo" class="text-muted">Selecciona una categoria para comenzar</p>
            </div>
            <div class="categorias">
                <button class="btn-categoria active" id="btnVideojuegos" data-categoria="videojuego">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="6" y1="12" x2="10" y2="12"/><line x1="8" y1="10" x2="8" y2="14"/>
                        <circle cx="15" cy="11" r="1"/><circle cx="17" cy="13" r="1"/>
                        <rect x="2" y="6" width="20" height="12" rx="4"/>
                    </svg>
                    Videojuegos
                </button>
                <button class="btn-categoria" id="btnConsolas" data-categoria="consola">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="2" y="3" width="20" height="14" rx="2"/>
                        <line x1="8" y1="21" x2="16" y2="21"/>
                        <line x1="12" y1="17" x2="12" y2="21"/>
                    </svg>
                    Consolas
                </button>

            </div>
            <div class="productos-header">
                <h2 id="tituloCategoria">Videojuegos</h2>
                <span class="productos-count" id="productosCount"></span>
            </div>
            <div class="productos-grid" id="productosGrid">
                <div class="productos-loading">
                    <div class="spinner"></div>
                    <span>Cargando productos...</span>
                </div>
            </div>
            <div id="paginacion", class="paginacion"></div>
        </div>

    </main>
    <script type="module" src="js/productos.js"></script>
</body>
</html>
