<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NextPlay - Tu ticket</title>
    <link rel="icon" type="image/x-icon" href="public/assets/favicon.ico">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .ticket-wrapper {
            max-width: 600px;
            margin: 0 auto;
        }

        

        .ticket-cargando,
        .ticket-error {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            padding: 5rem 1rem;
            text-align: center;
            color: var(--text-muted);
        }


        .ticket-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-xl);
            overflow: hidden;
            box-shadow: var(--shadow-lg);
            animation: fadeInUp 0.4s ease both;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }


        .ticket-card__header {
            background: linear-gradient(135deg, var(--violeta), #38BDF8);
            padding: 2rem;
            text-align: center;
            color: #fff;
        }

        .ticket-success-icon {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1rem;
        }

        .ticket-success-icon svg {
            width: 28px;
            height: 28px;
            color: #fff;
        }

        .ticket-card__header h2 {
            color: #fff;
            font-size: 1.6rem;
            margin-bottom: 0.35rem;
        }

        .ticket-card__header p {
            color: rgba(255, 255, 255, 0.85);
            font-size: 0.9rem;
        }


        .ticket-card__body {
            padding: 1.75rem;
        }

        .ticket-meta {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.25rem;
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        .ticket-meta span {
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        .ticket-meta svg {
            width: 16px;
            height: 16px;
            color: var(--text-muted);
        }


        .ticket-tabla {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
            margin-bottom: 1rem;
        }

        .ticket-tabla th {
            text-align: left;
            color: var(--text-muted);
            font-size: 0.78rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.4px;
            padding-bottom: 0.6rem;
            border-bottom: 1px solid var(--border-color);
        }

        .ticket-tabla td {
            padding: 0.65rem 0;
            border-bottom: 1px solid var(--border-color);
            color: var(--text-primary);
        }

        .ticket-tabla tr:last-child td {
            border-bottom: none;
        }

        .ticket-tabla__nombre { max-width: 220px; }

        .ticket-tabla__centro {
            text-align: center;
        }

        .ticket-tabla__derecha {
            text-align: right;
            font-family: 'Exo 2', sans-serif;
            font-weight: 700;
        }


        .ticket-total {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 0 0;
            margin-top: 0.5rem;
            border-top: 2px dashed var(--border-color);
            font-family: 'Exo 2', sans-serif;
            font-weight: 900;
            font-size: 1.3rem;
            color: var(--text-primary);
        }

        .ticket-total span:last-child {
            color: var(--violeta);
        }


        [data-theme="dark"] .ticket-total span:last-child {
            color: var(--violeta-claro);
        }
        .ticket-card__footer {
            padding: 1.25rem 1.75rem 1.75rem;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            border-top: 1px solid var(--border-color);
        }

        @media (max-width: 560px) {
            .ticket-card__body { padding: 1.25rem; }
            .ticket-card__footer { padding: 1rem 1.25rem 1.25rem; }
            .ticket-tabla__nombre { max-width: 120px; }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="navbar__brand">
            <div class="navbar__logo-placeholder">NP</div>
            <span class="navbar__appname">NextPlay</span>
        </a>
        <div class="navbar__nav">
            <a href="productos.html" class="navbar__link">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="2" y="3" width="20" height="14" rx="2"/>
                    <line x1="8" y1="21" x2="16" y2="21"/>
                    <line x1="12" y1="17" x2="12" y2="21"/>
                </svg>
                Productos
            </a>
        </div>
        <div class="navbar__right">
            <span class="navbar__alumnos">Alumnos: Llop Tomas &amp; Lopez Juan</span>
            <a href="carrito.html" class="navbar__carrito" title="Ver Carrito">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
                    <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
                </svg>
                <span class="carrito-badge" id="carritoBadge" style="display: none;">0</span>
            </a>
            <button class="btn-theme" id="btnTema" title="Cambiar tema" aria-label="Cambiar tema">
                <svg id="iconoSol" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
                    <circle cx="12" cy="12" r="5"/>
                    <line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
                    <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
                    <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
                    <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
                </svg>
                <svg id="iconoLuna" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
                </svg>
            </button>
        </div>
    </nav>

    <main class="main-content">
        <div class="container">
            <div class="ticket-wrapper">
                <div id="ticketContenido"></div>
            </div>
        </div>
    </main>

    <script type="module" src="js/ticket.js"></script>
</body>
</html>
